# Deploy V3 portfolio build to GitHub Pages
name: Deploy static content to Pages

on:
  push:
    branches: ["main"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          REACT_APP_apiKey: ${{ secrets.REACT_APP_apiKey }}
          REACT_APP_authDomain: ${{ secrets.REACT_APP_authDomain }}
          REACT_APP_projectId: ${{ secrets.REACT_APP_projectId }}
          REACT_APP_storageBucket: ${{ secrets.REACT_APP_storageBucket }}
          REACT_APP_messagingSenderId: ${{ secrets.REACT_APP_messagingSenderId }}
          REACT_APP_appId: ${{ secrets.REACT_APP_appId }}
          REACT_APP_measurementId: ${{ secrets.REACT_APP_measurementId }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: "docs"

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
