# One-time unlock: set site env PREVIEW_ACCESS_SECRET (Functions scope) to match
# api.carlmanuel.com — not available from this file; redeploy after setting.

[build]
  publish = "."
  command = ""

[[edge_functions]]
  path = "/*"
  function = "embed-only"

[[headers]]
  for = "/*"
  [headers.values]
    Content-Security-Policy = "frame-ancestors 'self' https://carlmanuel.com https://www.carlmanuel.com https://carlxaeron.github.io http://localhost:3000"
    X-Content-Type-Options = "nosniff"
